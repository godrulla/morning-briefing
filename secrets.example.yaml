# Secrets Configuration
# Copy this file to secrets.yaml and add your actual credentials
# NEVER commit secrets.yaml to version control!

# Google OAuth Credentials
google:
  # Path to your Google OAuth credentials file downloaded from Google Cloud Console
  credentials_file: "/Users/mando/Documents/morning-briefing/credentials/credentials.json"
  # Path where the OAuth token will be stored (generated on first run)
  token_file: "/Users/mando/Documents/morning-briefing/credentials/token.json"

# GitHub Access
github:
  # Your GitHub Personal Access Token (PAT)
  # Generate at: https://github.com/settings/tokens
  # Required scopes: repo, read:user, read:org
  access_token: "ghp_your_github_token_here"

# Alternative: Use macOS Keychain (recommended for production)
# Set use_keychain: true and the system will look for credentials in macOS Keychain
# To store in keychain, run:
# python3 -c "import keyring; keyring.set_password('morning-briefing', 'github_token', 'YOUR_TOKEN')"
use_keychain: false
